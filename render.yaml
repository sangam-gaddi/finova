services:
  - type: web
    name: finova
    runtime: node
    rootDir: .
    plan: starter
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        sync: false
      - key: VORA_AGENT_URL
        sync: false
      - key: VORA_MODEL
        sync: false
      - key: VORA_CONFIG_SECRET
        sync: false
      - key: OLLAMA_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: NEXT_PUBLIC_COINGECKO_API_KEY
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: NEXT_PUBLIC_LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: CARTESIA_API_KEY
        sync: false
      - key: NEXT_PUBLIC_CHAIN_ID
        sync: false
      - key: NEXT_PUBLIC_NETWORK_NAME
        sync: false
      - key: NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID
        sync: false

  - type: worker
    name: finova-voice-agent
    runtime: python
    rootDir: voice-agent
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python agent.py start
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: CARTESIA_API_KEY
        sync: false
